<!DOCTYPE html>
<html>
<head>
    <title>Nandas Official</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(to bottom, #f5e1b8, #e6c48f);
            text-align: center;
            padding: 30px 15px;
        }

        .container {
            max-width: 400px;
            margin: auto;
        }

        .logo {
            width: 110px;
            margin-bottom: 10px;
        }

        h1 {
            margin: 5px 0;
            font-size: 26px;
            color: #5a3b1e;
        }

        p {
            margin-bottom: 25px;
            color: #6b4c2a;
            font-size: 14px;
        }

        .btn {
            display: block;
            width: 100%;
            margin: 12px 0;
            padding: 14px;
            text-decoration: none;
            color: white;
            background: #7a4e2d;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 500;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
            transition: 0.2s;
        }

        .btn:hover {
            background: #5f3c22;
            transform: scale(1.03);
        }

        .phone {
            background: #a86b3c;
        }

        .footer {
            margin-top: 25px;
            font-size: 12px;
            color: #6b4c2a;
        }

        /* ✅ POPUP FIXED */
        #popup {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            justify-content: center;
            align-items: center;
        }

        .popup-box {
            background: #f5e1b8;
            width: 280px;
            padding: 20px;
            border-radius: 12px;
        }

        .popup-box a {
            display: block;
            margin: 10px 0;
            text-decoration: none;
            color: #333;
        }

        .close-btn {
            margin-top: 10px;
            padding: 8px 15px;
            border: none;
            background: #7a4e2d;
            color: white;
            border-radius: 8px;
        }

    </style>
</head>

<body>

<div class="container">

    <img src="logo.jpg" class="logo">

    <h1>Nandas Official</h1>
    <p>Folk Events | Music | Cultural Performances</p>

    <a class="btn" href="https://www.instagram.com/nandasofficial?igsh=bTN1eXBrOGp2cXJj">📸 Instagram</a>
    <a class="btn" href="https://www.facebook.com/share/1B2TLBAbBE/">📘 Facebook</a>
    <a class="btn" href="https://youtube.com/yourchannel">▶️ YouTube</a>
    <a class="btn" href="https://bebhawna.github.io/nandas-portfolio/">🌐 Portfolio</a>

    <!-- ✅ FIXED BUTTON -->
    <a class="btn phone" href="#" onclick="openPopup()">📞 Contact Us</a>

</div>

<!-- ✅ POPUP -->
<div id="popup" onclick="outsideClick(event)">
    <div class="popup-box">

        <h3>Choose Contact</h3>

        <a href="tel:+917454984078">📞 Anoop Bharti</a>
        <a href="tel:+918755323981">📞 Srishti Dhasmana</a>

        <button class="close-btn" onclick="closePopup()">Close</button>

    </div>
</div>

<script>
function openPopup() {
    document.getElementById("popup").style.display = "flex";
}

function closePopup() {
    document.getElementById("popup").style.display = "none";
}

function outsideClick(e) {
    if (e.target.id === "popup") {
        closePopup();
    }
}
</script>

</body>
</html>
